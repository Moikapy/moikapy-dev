name = "moikapy-dev"
main = ".open-next/worker.js"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "moikapy-dev"

# D1 database for blog posts
[[d1_databases]]
binding = "DB"
database_name = "moikapy-blog"
database_id = "56e72ffd-263c-49e6-991a-bcd5a9df3670"
migrations_dir = "drizzle"

# KV namespace for community insights cache
[[kv_namespaces]]
binding = "COMMUNITY_INSIGHTS"
id = "7afeb79a055b4290a9ccf88b94b2308a"
preview_id = "4e95667285b043fea2ec49624f0fa4fe"

# Cron triggers for community insights refresh
[triggers]
crons = ["*/30 * * * *"]

# Secrets (set via `wrangler secret put`):
#   ADMIN_PASSWORD_HASH  - SHA-256 hash of your admin password
#   SESSION_SECRET       - Random hex string for signing session cookies
#   OLLAMA_API_KEY       - Ollama Cloud API key for AI suggestions
#   ELEVENLABS_API_KEY   - ElevenLabs API key for speech-to-text dictation
#   CF_API_TOKEN         - Cloudflare API token for analytics (read-only)
#   CF_ZONE_ID            - Cloudflare Zone ID for moikapy.dev